
model:
  architecture: UNet
  encoder: resnet34

training:
  epochs: 3
  batch_size: 2
  learning_rate: 0.0001
  optimizer: Adam
  loss_function: BCEWithLogitsLoss

dataset:
  image_size: 512
  channels: 2
  mask_classes:
    0: no_change
    1: change

threshold:
  inference_threshold: 0.02

hardware:
  gpu: Tesla T4
  framework: PyTorch
